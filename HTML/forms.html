<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <body style="background-color: rgb(11, 190, 249);"></body>
    <form action="https://www.bmw.in/en/index.html">
        <fieldset style="background-image:linear-gradient(red,orange); border-radius: 40px 40px; padding:30px; bgcolor: rgb(16, 236, 126);">
            <legend align="center">Login form</legend>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" required name="password" maxlength="7"><br><br>
            <button type="submit">Login</button>
            <button type="reset">Reset</button>
        </fieldset>
    </form>

    
</body>
</html>
