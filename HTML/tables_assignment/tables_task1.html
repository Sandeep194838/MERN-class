<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 1</title>
</head>
<body>
    <!--Creating a Heading-->
    <h3 align="center">Weather Station</h3>
    <!--Creating a Table-->
    <table border="3" align="center" cellspacing="3" cellpadding="0">
        <!--Add Table Headers-->
        <tr>
            <th rowspan="2">Station</th>
            <th colspan="2">Temperature</th>
            <th rowspan="2">Humidity</th>
            <th rowspan="2">Weather</th>
        </tr>
        <!--Adding Sub Headers-->
        <tr>
            <th>Max</th>
            <th>Min</th>
        </tr>
        <!--Filling up the table data-->
        <tr>
            <td>USA</td>
            <td align="center">24</td>
            <td align="center">19</td>
            <td align="center">60%</td>
            <td>cloudy</td>
        </tr>
        <tr>
            <td>Germany</td>
            <td align="center">19</td>
            <td align="center">-1</td>
            <td align="center">70%</td>
            <td>Rainy</td>
    </table>
    
</body>
</html>
