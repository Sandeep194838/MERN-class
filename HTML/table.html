<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 align="center" style="color: red">Tables</h1>
    <marquee behavior="scroll" direction="left" scrollamount="10">
        <p style="color: green; font-size: 20px;">
            Welcome to the weather table!
        </p>
    </marquee>
    
       
<table border="1" align="center" cellpadding="5" cellspacing=""   style="color: blue; background-color: yellow">
  <tr>
    
    <th>Day</th>
    <th>Temperature</th>
    <th>Weather</th>
    <th>Wind</th>
  </tr>
  <tr>
    <td>Monday</td>
    <td>30°C</td>
    <td>Hot</td>
    <td>10 km/h</td>
  </tr>
  <tr>
    <td>Tuesday</td>  
    <td>28°C</td>
    <td>Warm</td>
    <td>12 km/h</td>
  </tr>
  <tr>
    <td>Wednesday</td>
    <td>25°C</td>
    <td>Cloudy</td> 
    <td>8 km/h</td>
  </tr>
  <tr>
    <td>Thursday</td>
    <td>27°C</td>
    <td>Sunny</td>
    <td>15 km/h</td>
  </tr>
  <tr>
    <td>Friday</td>
    <td>29°C</td>
    <td>Hot</td>
    <td>10 km/h</td>
  </tr>
  <tr>
    <td>Saturday</td>
    <td>31°C</td>
    <td>Very Hot</td>
    <td>20 km/h</td>
  </tr>
  <tr>
    <td>Sunday</td>
    <td>26°C</td>
    <td>Rainy</td>
    <td>5 km/h</td>
  </tr>
    
</body>
</html>
