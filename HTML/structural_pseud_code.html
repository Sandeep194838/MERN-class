<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:first-child{
            background-color: rgb(13, 232, 35);
            text-align: center;
            color:brown;
            font-weight: bolder;
            border-radius: 30px;
            font-size: 30px;

            border-top: solid rebeccapurple;
            border-bottom: solid rebeccapurple;
        }
        li:last-child{
            background-color: rgb(200, 144, 60);
        }
        li:nth-child(even){
            background-color: rgb(209, 41, 89);
        }
        li:nth-child(3){
            background-color: blueviolet;
        }

        button:first-of-type{
            background-color: rgb(34, 201, 201);
        }
        button:last-of-type{
            background-color: blanchedalmond;
        }
        button:nth-of-type(even){
            background-color: rgb(214, 106, 106);
        }
        button:nth-of-type(3){
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <ol> <li>List item-$</li>
        <li>List item-$</li>
        <li>List item-$</li>
        <li>List item-$</li>
        <li>List item-$</li>
    </ol>
   

    <button>Button-1</button>
    <button>Button-2</button>
    <button>Button-3</button>
    <button>Button-4</button>
    <button>Button-5</button>
</body>
</html>
