<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form{
            background-image: url('https://cdn.pixabay.com/photo/2016/11/02/22/53/background-1792968_960_720.jpg');
            background-size: cover;
            height: 100vh;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        fieldset{
            border: none;
            backdrop-filter: blur(50px);
            margin:20px;
            padding:30px;
            border-radius:50px 50px;
            box-shadow: 10px 10px 5px aliceblue;
        
        }

        label{
            color:aliceblue;
            font-size: 20px;
            font-weight: bold;
            font-style: italic;
            margin-right: 20px;
        }

        button{
            padding: 10px 30px;
            background-color: salmon;
            font-weight: bold;
            font-family: monospace;
            border-radius: 8px;

        }

        h1{
            color: transparent;
            background-image: linear-gradient(red,gold,green);
            background-clip: text;
            font-size: 40px;
            font-weight: bold;
            font-family: cursive;
        }

    </style>
</head>
<body>
    <form action="" method="post">
        <fieldset>
            <h1 align="center" >Job Registration Form</h1>
            <label for="fname"> First Name:</label>
            <input type="text" id="fname" minlength="2" maxlength="10" required placeholder="Enter First Name"><br><br>
            <label for="lname"> Last Name:</label>
            <input type="text" id="lname" required placeholder="Enter Last Name"><br><br>
            <label for="email"> Email:</label>
            <input type="email" id="email" required placeholder="Enter Email"><br><br>
            <label for="state">State</label>
            <select name="" id="state">
                <option value="AP">AP</option>
                <option value="MP">MP</option>
                <option value="UP">UP</option>
                <option value="TN">TN</option>
            </select><br><br>
            <label for="dob"> Date of Birth:</label>
            <input type="date" id="dob" required><br><br>
            <label for="age"> Age:</label>
            <input type="number" id="age" required placeholder="Enter Age"><br><br>
            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label><br><br>
            <label for="phno">Phone number</label>
            <input type="tel" pattern="[6-9]{1}[0-9{9}]" id="phno" required placeholder="+91"<br><br>
            <button type="submit">Submit</button>
            


        </fieldset>
    </form>
    
</body>
</html>
