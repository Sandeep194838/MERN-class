<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        li:first-child {
            color: red;
        }

        li:nth-child(2) {
            color: rgb(0,255,255);
            background-color: rgb(0,0,0);
        }

        li:nth-child(3) {
            border: 10px solid rgba(237, 66, 237, 0.5);
            background-color: rgba(41, 244, 14, 0.6);
        }

        li:nth-child(4) {
            color: hsl(12deg, 80%, 56%);
            background-color: hsl(240deg, 64%, 51%);
        }

        li:nth-child(5){
            color: hsla(357, 94%, 51%, 0.929);
            background-color: hsla(240, 96%, 49%, 0.5);
        }

        li:nth-child(6) {
            color: #f818d2;
        }

    </style>
</head>
<body>
    <ol>
        <li>Heading</li>
        <li>Heading</li>
        <li>Heading</li>
        <li>Heading</li>
        <li>Heading</li>
        <li>Heading</li>
    </ol>
</body>
</html>
